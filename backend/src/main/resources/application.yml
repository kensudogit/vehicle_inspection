spring:
  application:
    name: vehicle-inspection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vehicle_inspection}
    username: ${DB_USER:vi_user}
    password: ${DB_PASSWORD:vi_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Tokyo
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  seed-sample-data: ${SEED_SAMPLE_DATA:true}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-256bit-secret-key-here!!}
    expiration-ms: 86400000
  mfa:
    issuer: VehicleInspection
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    bucket: ${S3_BUCKET:vehicle-inspection-docs}
    region: ${AWS_REGION:ap-northeast-1}
    local-path: ${LOCAL_STORAGE_PATH:./storage}
    endpoint: ${S3_ENDPOINT:}
  notification:
    expiry-days-before: ${EXPIRY_NOTIFY_DAYS:30,14,7,1}
  integration:
    electronic-inspection:
      enabled: ${ELECTRONIC_INSPECTION_ENABLED:false}
      base-url: ${ELECTRONIC_INSPECTION_URL:}
    oss:
      enabled: ${OSS_ENABLED:false}
      base-url: ${OSS_BASE_URL:}
    sms:
      enabled: ${SMS_ENABLED:false}
      provider: ${SMS_PROVIDER:mock}
    email:
      enabled: ${EMAIL_ENABLED:true}
      from: ${EMAIL_FROM:noreply@vehicle-inspection.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","logger":"%logger{36}","message":"%msg","traceId":"%X{traceId}"}%n'
